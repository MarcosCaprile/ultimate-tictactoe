<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ultimate Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="index.html" class="brand">UltimateTTT</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="play.html">Play</a>
        <a href="online.html" class="nav-play-btn">Online</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-hero compact">
        <span class="section-kicker">Account</span>
        <h1>Anmelden oder registrieren</h1>
        <p class="hero-text narrow">
          Erstelle deinen Account für Online-Matches, Einladungen und spätere Leaderboards.
        </p>
      </section>

      <section class="lobby-grid">
        <article class="lobby-card">
          <h2>Registrieren</h2>

          <label class="input-label" for="registerUsername">Username</label>
          <input id="registerUsername" class="room-input" type="text" placeholder="username" maxlength="20" />

          <label class="input-label" for="registerEmail">E-Mail</label>
          <input id="registerEmail" class="room-input" type="email" placeholder="deine@email.de" />

          <label class="input-label" for="registerPassword">Passwort</label>
          <input id="registerPassword" class="room-input" type="password" placeholder="mindestens 6 Zeichen" />

          <div class="stack-actions">
            <button class="primary-btn" id="registerBtn" type="button">Account erstellen</button>
          </div>

          <span class="join-hint" id="registerHint">Noch kein Account vorhanden.</span>
        </article>

        <article class="lobby-card">
          <h2>Anmelden</h2>

          <label class="input-label" for="loginEmail">E-Mail</label>
          <input id="loginEmail" class="room-input" type="email" placeholder="deine@email.de" />

          <label class="input-label" for="loginPassword">Passwort</label>
          <input id="loginPassword" class="room-input" type="password" placeholder="Dein Passwort" />

          <div class="stack-actions">
            <button class="primary-btn" id="loginBtn" type="button">Einloggen</button>
          </div>

          <span class="join-hint" id="loginHint">Nutze deinen bestehenden Account.</span>
        </article>
      </section>
    </main>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
