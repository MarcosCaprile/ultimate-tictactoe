<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Tic Tac Toe - Game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="game-effects.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="index.html" class="brand">UltimateTTT</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="play.html">Play</a>
        <a href="lobby.html">Lobby</a>
        <a href="game.html" class="nav-play-btn">Game</a>
      </nav>
    </header>

    <main class="game-layout">
      <section class="game-headline">
        <div>
          <span class="section-kicker">Game board</span>
          <h1>Ultimate Tic Tac Toe</h1>
          <p class="subtitle" id="gameSubtitle">
            Realtime-Spiel mit sauberer Host/Gast-Trennung, Presence und Gewinnanimationen.
          </p>
        </div>

        <div class="game-actions">
          <a href="play.html" class="secondary-btn small-btn">Zurück zum Hub</a>
          <button id="copyRoomCodeBtn" class="secondary-btn small-btn" type="button">Code kopieren</button>
          <button id="copyJoinLinkBtn" class="secondary-btn small-btn" type="button">Join-Link kopieren</button>
          <button id="leaveRoomBtn" class="secondary-btn small-btn" type="button">Room verlassen</button>
          <button id="resetBtn" class="primary-btn small-btn button-reset" type="button">Neues Spiel</button>
        </div>
      </section>

      <section class="info-panel">
        <div class="info-card">
          <span class="label">Modus</span>
          <span id="modeText" class="value">Local</span>
        </div>

        <div class="info-card">
          <span class="label">Dein Symbol</span>
          <span id="playerRoleText" class="value">-</span>
        </div>

        <div class="info-card">
          <span class="label">Gegner Status</span>
          <span id="opponentStatusText" class="value">-</span>
        </div>

        <div class="info-card">
          <span class="label">Aktueller Spieler</span>
          <span id="currentPlayer" class="value">X</span>
        </div>

        <div class="info-card">
          <span class="label">Nächstes Feld</span>
          <span id="targetBoard" class="value">Beliebig</span>
        </div>

        <div class="info-card">
          <span class="label">Status</span>
          <span id="statusText" class="value">Spiel läuft</span>
        </div>

        <div class="info-card">
          <span class="label">Room</span>
          <span id="roomCodeText" class="value">-</span>
        </div>
      </section>

      <section class="game-board-section">
        <div id="ultimateBoard" class="ultimate-board"></div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
