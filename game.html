<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Tic Tac Toe - Game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="game-effects.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="/index.html" class="brand">UltimateTTT</a>
      <nav class="nav">
        <a href="/index.html">Home</a>
        <a href="/play.html">Play</a>
        <a href="/online.html">Online</a>
        <a href="/game.html" class="nav-play-btn">Game</a>
      </nav>
    </header>

    <main class="game-layout">
      <section class="game-headline">
        <div>
          <span class="section-kicker">Game board</span>
          <h1>Ultimate Tic Tac Toe</h1>
          <p class="subtitle" id="gameSubtitle">
            Online-Match oder lokales Spiel.
          </p>
          <p class="subtitle" style="margin-top:10px;">
            Wichtig: <strong>Nur blau markierte Mini-Boards sind spielbar.</strong>
          </p>
        </div>

        <div class="game-actions">
          <a href="/play.html" class="secondary-btn small-btn">Zurück</a>
          <button id="leaveGameBtn" class="secondary-btn small-btn" type="button">Spiel verlassen</button>
          <button id="resetBtn" class="primary-btn small-btn button-reset" type="button">Lokales Spiel neu starten</button>
        </div>
      </section>

      <section class="info-panel">
        <div class="info-card">
          <span class="label">Modus</span>
          <span id="modeText" class="value">-</span>
        </div>

        <div class="info-card">
          <span class="label">Du bist</span>
          <span id="playerRoleText" class="value">-</span>
        </div>

        <div class="info-card">
          <span class="label">Aktueller Spieler</span>
          <span id="currentPlayer" class="value">X</span>
        </div>

        <div class="info-card">
          <span class="label">Nächstes Feld</span>
          <span id="targetBoard" class="value">Beliebig</span>
        </div>

        <div class="info-card">
          <span class="label">Status</span>
          <span id="statusText" class="value">Spiel läuft</span>
        </div>

        <div class="info-card">
          <span class="label">Game ID</span>
          <span id="gameIdText" class="value">-</span>
        </div>
      </section>

      <section class="game-board-section">
        <div id="ultimateBoard" class="ultimate-board"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/game.js"></script>
</body>
</html>
